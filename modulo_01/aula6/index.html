<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Flexbox - Rodrigo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="site-wrapper">

    <!-- Navbar com Space-Between -->
    <nav class="navbar">
        <div class="logo">RODRIGO.DEV</div>
        <div class="nav-links">
            <a href="#">Início</a>
            <a href="#">Sobre</a>
            <a href="#">Projetos</a>
        </div>
    </nav>

    <!-- Hero Section Centralizada -->
    <section class="hero">
        <h1>Bem-vindo ao meu Portfólio</h1>
        <p>Estudante de ADS na FATEC 2026</p>
    </section>

    <!-- Layout Sidebar + Conteúdo -->
    <div class="main-layout">
        <aside class="sidebar">
            <h3>Menu</h3>
            <ul>
                <li>Perfil</li>
                <li>Habilidades</li>
                <li>Contatos</li>
            </ul>
        </aside>

        <main class="content">
            <h2>Meus Hobbies</h2>
            <!-- Cards com Flex-Wrap e Gap -->
            <div class="card-container">
                <div class="card">🚀 Programação</div>
                <div class="card">🎸 Música</div>
                <div class="card">⚽ Esportes</div>
                <div class="card">🎮 Games</div>
            </div>
        </main>
    </div>

    <!-- Footer no final da página -->
    <footer class="footer">
        <p>FATEC 2026 - Desenvolvido por Rodrigo da Silva</p>
    </footer>

</body>
</html>
