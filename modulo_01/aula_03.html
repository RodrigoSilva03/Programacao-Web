<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/style.css" rel="stylesheet" type="text/css">
    <title>Formulario</title>
</head>
<body> 
    <form action="/cadastro" method="POST">
  <!-- Grupo de Informações Pessoais -->
  <fieldset>
    <legend>Informações Pessoais</legend>
    <p>
      <label for="nome">Nome Completo:</label>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
    </p>
    <p>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="exemplo@dominio.com" required>
    </p>
    <p>
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" 
       placeholder="000.000.000-00" 
       pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" 
       title="Digite o CPF no formato: 000.000.000-00" 
       inputmode="numeric" required>

    </p>
    <p>
      <label for="senha">Senha:</label>
      <input type="password" id="senha" name="senha" required>
    </p>
    <p>
      <label for="nascimento">Data de Nascimento:</label>
      <input type="date" id="nascimento" name="nascimento">
    </p>
  </fieldset>
  <!-- Grupo de Preferências -->

  <fieldset>
    <legend>Preferências e Arquivos</legend>
    <p>Gênero:
      <input type="radio" id="masc" name="genero" value="m">
      <label for="masc">Masculino</label>
      <input type="radio" id="fem" name="genero" value="f">
      <label for="fem">Feminino</label>
    </p>
    <p>
      <input type="checkbox" id="newsletter" name="newsletter" checked>
      <label for="newsletter">Desejo receber novidades por e-mail</label>
    </p>
    <p>
      <label for="cor_favorita">Cor Favorita:</label>
      <input type="color" id="cor_favorita" name="cor_favorita" value="#ff0000">
    </p>
    <p>
      <label for="curriculo">Faça upload do seu CV:</label>
      <input type="file" id="curriculo" name="curriculo">
    </p>
  </fieldset>
  <!-- Grupo de Mensagem -->
  <fieldset>
    <legend>Sua Opinião</legend>
   
    <p>
      <label for="mensagem">Mensagem adicional:</label><br>
      <textarea id="mensagem" name="mensagem" rows="4" cols="30"></textarea>
    </p>
  </fieldset>

  <!-- Botões de Ação -->
  <div style="margin-top: 20px;">
    <input type="submit" value="Enviar Formulário">
    <input type="reset" value="Limpar Tudo">
    <!-- Campo oculto (útil para IDs ou tokens de segurança) -->
    <input type="hidden" name="user_id" value="12345">
  </div>
</form>
    </form>
</body>
</html>
